name: Build and Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: ${{vars.PROJECT_ID}}
  REGION: ${{vars.REGION}}
  SERVICE: ${{vars.SERVICE}}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{steps.get-version.outputs.version}}
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Repository
        id: checkout
        uses: actions/checkout@v6

      - name: Get Repository Version
        id: get-version
        run: |-
          VERSION=$(grep "version = " build.gradle | sed -E "s/.*version = '([^']+)'.*/\1/")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version read from build.gradle: $VERSION"

      - name: Authenticate to Google Cloud
        id: auth-gcloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{secrets.GCP_SA_KEY}}

      - name: Setup Google Cloud
        id: setup-gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker Auth
        id: configure-docker
        run: gcloud auth configure-docker ${{env.REGION}}-docker.pkg.dev

      - name: Build and Push Container
        id: build-push
        run: |-
          DOCKER_TAG="${{env.REGION}}-docker.pkg.dev/${{env.PROJECT_ID}}/${{env.SERVICE}}/${{env.SERVICE}}:${{steps.get-version.outputs.version}}"
          docker build --tag "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth-gcloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{secrets.GCP_SA_KEY}}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        timeout-minutes: 3
        with:
          service: ${{env.SERVICE}}
          region: ${{env.REGION}}
          image: ${{env.REGION}}-docker.pkg.dev/${{env.PROJECT_ID}}/${{env.SERVICE}}/${{env.SERVICE}}:${{needs.build.outputs.version}}

      - name: Show output
        id: end
        run: |2-
          echo ${{steps.deploy.outputs.url}}
