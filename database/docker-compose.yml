services:
  postgres:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thesis-postgres-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - thesis-postgres-db-data:/var/lib/postgresql

volumes:
  thesis-postgres-db-data: