spring:
  datasource:
    url: "jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${INSTANCE_CONNECTION_NAME}&socketFactory=com.google.cloud.sql.postgres.SocketFactory"
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
    cloud:
      gcp:
        sql:
          database-name: ${DB_NAME}
          instance-connection-name: ${INSTANCE_CONNECTION_NAME}

logs:
  enabled: ${LOGS_ENABLED:false}